# detekt config — built upon the default ruleset (buildUponDefaultConfig = true).
# Only deltas live here; correctness rules stay at their defaults (eng-req:
# no blanket silencing).

complexity:
  LongParameterList:
    # DI constructors (composition root / ViewModels / the PlatformSdk forwarder)
    # legitimately take several collaborators — the iOS init signatures do too.
    functionThreshold: 8
    constructorThreshold: 12
  TooManyFunctions:
    # The PlatformSdk facade + EventBus are wide ports of the iOS protocols;
    # splitting them would break the single-seam contract (ISP at the boundary).
    # A Compose screen file is also a flat list of small @Composable functions —
    # an arbitrary per-file cap fights that idiom, so it is raised to match.
    thresholdInClasses: 20
    thresholdInInterfaces: 20
    thresholdInFiles: 20

naming:
  FunctionNaming:
    # Jetpack Compose @Composable functions are PascalCase by convention.
    ignoreAnnotated: ["Composable"]

style:
  MagicNumber:
    ignorePropertyDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true

# NB: formatting (ktlint-wrapping) rules are intentionally NOT configured here.
# They live in the detekt-formatting plugin, which is not applied — ktlint + the
# .editorconfig own formatting (DRY). Declaring a `formatting:` block without that
# plugin fails detekt config validation, so it is omitted.
