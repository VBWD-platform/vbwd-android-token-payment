name: publish
on:
  push:
    tags: ["v*"]
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Publish token-payment to GitHub Packages
        run: ./gradlew :token-payment:publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          # Falls back to the workflow token; set a PACKAGES_TOKEN secret (read:packages)
          # if this build must resolve upstream com.vbwd:vbwd-android-* from sibling repos.
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
